<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>法律倫理學考古題庫</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <h1>法律倫理學考古題庫</h1>
    <p class="subtitle">律師考試 ・ 司法官考試 ・ 民國100–114年</p>
  </div>
</header>

<main>

  <!-- ── Search Panel ── -->
  <section class="search-panel">

    <!-- Mode Tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="keyword">
        <span class="tab-icon">🔍</span> 關鍵字搜尋
      </button>
      <button class="mode-tab" data-mode="scenario">
        <span class="tab-icon">💡</span> 情境搜尋
      </button>
      <button class="mode-tab" data-mode="ai">
        <span class="tab-icon">⚖️</span> AI 申論答題
      </button>
    </div>

    <!-- ── Keyword Mode ── -->
    <div id="keywordMode">
      <div class="search-row">
        <input
          id="searchInput"
          type="text"
          placeholder="輸入關鍵字，例如：保密義務、利益衝突、法官迴避…"
          autocomplete="off"
        />
        <button id="clearBtn" title="清除">✕</button>
      </div>

      <div class="filter-row">
        <div class="filter-group">
          <span class="filter-label">考試：</span>
          <button class="pill active" data-filter="examType" data-value="">全部</button>
          <button class="pill" data-filter="examType" data-value="律師考試">律師考試</button>
          <button class="pill" data-filter="examType" data-value="司法特考">司法特考</button>
        </div>

        <div class="filter-group">
          <span class="filter-label">題型：</span>
          <button class="pill active" data-filter="qType" data-value="">全部</button>
          <button class="pill" data-filter="qType" data-value="單選題">單選題</button>
          <button class="pill" data-filter="qType" data-value="申論題">申論題</button>
        </div>

        <div class="filter-group">
          <span class="filter-label">年份：</span>
          <select id="yearSelect" class="pill">
            <option value="">全部年份</option>
          </select>
        </div>
      </div>

      <div class="tags-row">
        <span class="tags-label">主題：</span>
        <div class="tags-wrap" id="tagsWrap"></div>
      </div>
    </div>

    <!-- ── Scenario Mode ── -->
    <div id="scenarioMode" style="display:none">
      <div class="scenario-input-wrap">
        <textarea
          id="scenarioInput"
          rows="4"
          placeholder="用白話文描述一個情境，例如：&#10;律師甲即將離開事務所，他想聯繫原本負責的客戶，希望客戶跟他走到新事務所繼續委任他辦案…"
        ></textarea>
        <button id="scenarioSearchBtn">搜尋相關題目</button>
      </div>
      <div class="scenario-examples">
        <span class="ex-label">情境範例：</span>
        <span class="ex-chip" data-text="律師知道客戶打算詐騙朋友，應不應該透露給朋友？">保密義務例外</span>
        <span class="ex-chip" data-text="法官的配偶是這個案件的律師，法官該怎麼辦？">法官迴避</span>
        <span class="ex-chip" data-text="律師同時幫原告和被告辦同一件案件">雙方代理</span>
        <span class="ex-chip" data-text="律師離職前聯繫客戶希望客戶轉委任自己">受僱律師離職</span>
        <span class="ex-chip" data-text="代書介紹案件給律師，律師要給代書介紹費">介紹費</span>
        <span class="ex-chip" data-text="檢察官起訴後發現被告可能是無辜的">檢察官客觀義務</span>
      </div>
    </div>

    <!-- ── AI 申論答題 Mode ── -->
    <div id="aiMode" style="display:none">
      <div class="ai-input-wrap">
        <textarea
          id="aiQuestion"
          rows="5"
          placeholder="輸入申論題題目，例如：&#10;律師甲受A委任處理其與B間之合約糾紛。案件進行中，B另行委任甲擔任其代理人，甲未告知A即接受B之委任。試問甲之行為是否違反律師倫理規範？"
        ></textarea>
        <div class="style-toggle-row">
          <span class="style-label">答題風格：</span>
          <button class="style-btn active" data-style="structured">條列式三段論</button>
          <button class="style-btn" data-style="paragraph">段落式（涵攝為核心）</button>
        </div>
        <div class="ai-submit-row">
          <button id="aiSubmitBtn">
            <span id="aiSubmitText">生成申論答案</span>
            <span id="aiLoadingSpinner" style="display:none">⏳ 生成中…</span>
          </button>
          <span class="token-badge">⚡ 消耗 API Token</span>
        </div>
      </div>
      <div class="ai-examples">
        <span class="ex-label">題目範例：</span>
        <span class="ex-chip ai-ex-chip" data-text="律師甲同時接受A與B之委任，A、B係同一訴訟之對立當事人。甲事後知悉此情形，仍未向任何一方說明。試論律師甲之行為有無違反律師倫理規範，應受何種懲戒？">利益衝突</span>
        <span class="ex-chip ai-ex-chip" data-text="法官甲在審理刑事案件期間，接受媒體採訪，就案件進行中之爭點公開發表意見，並批評辯護律師之策略。試論法官甲之行為是否違反法官倫理規範及相關法律規定？">法官媒體發言</span>
        <span class="ex-chip ai-ex-chip" data-text="檢察官甲偵辦貪污案件，上級檢察長以書面命甲撤回起訴，甲認為被告犯罪嫌疑重大，不服從指示。試問甲之行為是否符合檢察一體原則？有無違反檢察官倫理規範？">檢察一體</span>
        <span class="ex-chip ai-ex-chip" data-text="律師甲曾以主任檢察官身分偵辦A案，離職轉任律師後，受B委任擔任A案二審辯護人。試論此情形是否違反律師倫理規範？">司法官轉任限制</span>
        <span class="ex-chip ai-ex-chip" data-text="律師甲在禁見被告羈押期間，以辯護人身分接見被告後，將被告家書及相關文件攜出交予被告家屬。試論甲之行為有無違反律師法及律師倫理規範？">律見特權濫用</span>
      </div>
      <div id="aiAnswerWrap" style="display:none">
        <div class="ai-answer-header">
          <h3>申論答案</h3>
          <button id="aiCopyBtn" title="複製答案">📋 複製</button>
        </div>
        <div id="aiAnswer" class="ai-answer"></div>
      </div>
    </div>

  </section>

  <!-- ── Results Bar ── -->
  <div class="results-bar">
    <span class="results-count" id="resultsCount">共找到 <strong>0</strong> 題</span>
    <button id="resetBtn">重設</button>
  </div>

  <!-- ── Questions ── -->
  <div class="questions-list" id="questionsList"></div>

  <div class="empty-state" id="emptyState">
    <div class="icon">⚖️</div>
    <p>找不到符合條件的考古題</p>
    <small>請嘗試其他關鍵字或調整情境描述</small>
  </div>

</main>

<footer class="site-footer">
  <p>
    考題來源：<a href="https://wwwq.moex.gov.tw/exam/wFrmExamQandASearch.aspx" target="_blank" rel="noopener">考選部歷屆試題</a>
    ／原題連結指向 <a href="https://lawplayer.com" target="_blank" rel="noopener">lawplayer.com</a>，答案以考選部公告為準。
    民國115年第一試預定 115年8月1日舉行，考後更新。
  </p>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script src="ai.js"></script>
</body>
</html>
